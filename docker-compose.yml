services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: fidelios
      POSTGRES_PASSWORD: fidelios
      POSTGRES_DB: fidelios
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fidelios -d fidelios"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://fidelios:fidelios@db:5432/fidelios
      PORT: "3100"
      SERVE_UI: "true"
      FIDELIOS_DEPLOYMENT_MODE: "authenticated"
      FIDELIOS_DEPLOYMENT_EXPOSURE: "private"
      FIDELIOS_PUBLIC_URL: "${FIDELIOS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - fidelios-data:/fidelios
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  fidelios-data:

