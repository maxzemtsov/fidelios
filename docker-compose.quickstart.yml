services:
  fidelios:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${FIDELIOS_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      FIDELIOS_HOME: "/fidelios"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      FIDELIOS_DEPLOYMENT_MODE: "authenticated"
      FIDELIOS_DEPLOYMENT_EXPOSURE: "private"
      FIDELIOS_PUBLIC_URL: "${FIDELIOS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${FIDELIOS_DATA_DIR:-./data/docker-fidelios}:/fidelios"

